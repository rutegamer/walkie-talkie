<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walkie-Talkie Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Layar 1: Masuk Room -->
        <div id="room-screen" class="screen active">
            <h1>Walkie-Talkie</h1>
            <p>Masukkan identitas dan kode room.</p>
            <input type="text" id="user-name" placeholder="Nama Anda" maxlength="10">
            <input type="text" id="room-code-input" placeholder="Kode Room" autocomplete="off" maxlength="8">
            <button id="join-btn" class="primary-btn">Masuk Room</button>
        </div>

        <!-- Layar 2: Walkie-Talkie -->
        <div id="wt-screen" class="screen hidden">
            <div class="header">
                <div class="room-info">
                    <h2>Room: <span id="display-room-code">----</span></h2>
                    <!-- Badge jumlah user -->
                    <div id="user-badge" class="user-badge">Online: 0</div>
                </div>
                <button id="leave-btn" class="secondary-btn">Keluar</button>
            </div>
            
            <!-- Daftar nama user (Fitur baru) -->
            <div id="user-list" class="user-list">Memuat daftar...</div>
            
            <div id="status" class="status">Siap Digunakan</div>
            <button id="ptt-btn" class="ptt-btn" disabled>PUSH TO TALK</button>
            <audio id="audio-playback" style="display: none;"></audio>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

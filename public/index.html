<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walkie-Talkie Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="room-screen" class="screen active">
            <h1>Walkie-Talkie</h1>
            <input type="text" id="user-name" placeholder="Nama Anda" maxlength="10">
            <input type="text" id="room-code-input" placeholder="Kode Room">
            <button id="join-btn" class="primary-btn">Masuk Room</button>
        </div>

        <div id="wt-screen" class="screen">
            <h2>Room: <span id="display-room-code">----</span></h2>
            <div id="user-list" class="user-list">Memuat daftar...</div>
            <button id="ptt-btn" class="ptt-btn" disabled>PTT</button>
            <p id="status" style="margin-top:20px; color:#94a3b8;">Siap</p>
            <button id="leave-btn" class="secondary-btn" style="margin-top:10px; background:none; border:none; color:#ef4444;">Keluar</button>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

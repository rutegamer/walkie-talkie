<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walkie-Talkie Mewah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Room Screen -->
        <div id="room-screen" class="screen">
            <h1>Walkie-Talkie</h1>
            <input type="text" id="room-code-input" placeholder="Masukkan Kode Room">
            <button id="join-btn" class="primary-btn">Masuk Room</button>
        </div>
        <!-- Walkie-Talkie Screen -->
        <div id="wt-screen" class="screen hidden">
            <button id="ptt-btn" class="ptt-btn">PTT</button>
            <p id="status" class="status">Siap Digunakan</p>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
